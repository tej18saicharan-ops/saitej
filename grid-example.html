<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>learn grid</title>
    <style>
      .one {
        height: 200px;
        width: auto;
        font-size: 200px;
        text-align: center;
      }
      .two {
        height: 200px;
        width: auto;
        font-size: 200px;
        text-align: center;
      }
      .three {

      }

      .four {
        height: 200px;
        width: auto;
        font-size: 200px;
        text-align: center;
      }
      .main {
        display: grid;
        grid-template-columns: 30% 70%;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="main">
        <div class="one">
          <iframe
            width="560"
            height="315"
            src="https://www.youtube.com/embed/xpqpgE3hlwA?si=Mh6djeCTXOoQGS7i"
            title="YouTube video player"
            frameborder="0"
            allow="
              accelerometer;
              autoplay;
              clipboard-write;
              encrypted-media;
              gyroscope;
              picture-in-picture;
              web-share;
            "
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen
          ></iframe>
        </div>
      </div>
      <div>
        <div class="two">
