<html>
  <head>
    <title>Netflix Hero</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
      }

      .hero {
        position: relative;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        color: white;
      }

      /* Background image */
      .hero img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Dark overlay */
      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
      }

      /* Navbar */
      .logo {
        position: absolute;
        top: 20px;
        left: 40px;
        font-size: 28px;
        font-weight: bold;
        color: #e50914;
      }

      .signin {
        position: absolute;
        top: 20px;
        right: 40px;
      }

      .sign {
        background: #e50914;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
      }

      /* Center content */
      .content {
        position: absolute;
        top: 35%;
        right: 100px;
        text-align: center;
        width: 80%;
      }

      h1 {
        font-size: 48px;
        font-weight: bold;
      }

      h2 {
        margin-top: 10px;
        font-size: 22px;
        font-weight: normal;
      }

      p {
        margin-top: 20px;
        font-size: 16px;
      }

      .form {
        margin-top: 20px;
      }

      input {
        padding: 14px;
        width: 300px;
        border: none;
        outline: none;
      }

      .started {
        padding: 14px 20px;
        background: #e50914;
        color: white;
        border: none;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="hero">
      <!-- Background -->
      <img
        src="https://wallpapercave.com/wp/wp14818830.webp"
        alt="background"
      />

      <!-- Overlay -->
      <div class="overlay"></div>

      <!-- Logo -->
      <div class="logo">NETFLIX</div>

      <!-- Sign in -->
      <div class="signin">
        <button class="sign">Sign In</button>
      </div>

      <!-- Center Content -->
      <div class="content">
        <h1>Unlimited movies,<br />shows, and more</h1>
        <h2>Starts at ₹149. Cancel at any time.</h2>
        <p>
          Ready to watch? Enter your email to create or restart your membership.
        </p>

        <div class="form">
          <input type="email" placeholder="Email address" />
          <button class="started">Get Started ></button>
        </div>
      </div>
    </div>
  </body>
</html>
